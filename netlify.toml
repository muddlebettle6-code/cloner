# Netlify builds the site from this source repo (no more manual build + push),
# and serves the review console + its API from the same site.
[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

# The internal console should not be indexed by search engines.
[[headers]]
  for = "/console/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
